<div class="prelievo-container">
    <h4>Prelievo</h4>
    <form (ngSubmit)="prelievaImporto(amount)">
        <div class="form-group">
            <input type="number" id="amount" [(ngModel)]="amount" name="amount" required>
            <input type="text" id="description" [(ngModel)]="description" name="description" placeholder="Descrizione (opzionale)">
        </div>
        <button type="submit" class="btn-preleva">Preleva</button>
    </form>
</div>
